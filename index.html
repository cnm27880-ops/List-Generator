<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>護家名單系統 ＿ [RAW_EDITION]</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ========================================
           CSS 變數 — 工業反主流配色
           ======================================== */
        :root {
            --bg-dark: #161614;
            --bg-surface: #20201e;
            --bg-offset: #2c2c2a;
            
            --text-light: #eae6d9;
            --text-dim: #94928b;
            --text-dark: #161614;

            --accent-orange: #ff5e00;
            --accent-yellow: #f2b705;
            --accent-green: #a4b35a;

            --border-width: 2px;
            --border-color: #eae6d9;
            
            --shadow-solid: 6px 6px 0px var(--accent-orange);
            --shadow-solid-hover: 2px 2px 0px var(--accent-orange);
            --shadow-solid-alt: 4px 4px 0px var(--border-color);
            
            --transition-raw: 0.15s cubic-bezier(0, 0, 0.2, 1);
        }

        /* ========================================
           全域重設
           ======================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'JetBrains Mono', 'Noto Sans TC', monospace, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ========================================
           圖示 (SVG 手繪幾何風)
           ======================================== */
        .icon-raw {
            width: 24px; height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: square;
            stroke-linejoin: miter;
            transform: rotate(-3deg); /* 刻意傾斜營造手繪感 */
            transition: transform var(--transition-raw);
        }
        
        /* ========================================
           側邊欄 (不對稱厚重感)
           ======================================== */
        .sidebar {
            position: fixed; top: 0; left: 0; z-index: 1000;
            width: 280px; height: 100%;
            background: var(--bg-dark);
            border-right: var(--border-width) solid var(--border-color);
            padding: 40px 0;
            display: flex; flex-direction: column;
        }

        .sidebar-brand {
            padding: 0 30px 40px;
            font-size: 14px; font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent-orange);
            text-transform: uppercase;
            border-bottom: var(--border-width) dashed var(--text-dim);
            margin-bottom: 20px;
        }

        .sidebar a.menu-link {
            display: flex; align-items: center; gap: 16px;
            padding: 16px 30px;
            text-decoration: none; font-size: 15px; font-weight: 700;
            color: var(--text-dim);
            transition: all var(--transition-raw);
            border-left: 0px solid var(--accent-orange);
        }
        
        .sidebar a.menu-link:hover {
            color: var(--text-light);
            background: var(--bg-surface);
        }
        
        .sidebar a.menu-link.active {
            color: var(--bg-dark);
            background: var(--accent-orange);
            border-left: 8px solid var(--text-light);
        }
        .sidebar a.menu-link.active .icon-raw {
            transform: rotate(0deg) scale(1.1);
            stroke: var(--bg-dark);
        }

        /* 隱藏原生漢堡選單，改用桌面優先的不對稱佈局 */
        .hamburger, .sidebar-overlay, .closebtn { display: none; }

        /* ========================================
           主區域 (錯位排版)
           ======================================== */
        .main-content {
            margin-left: 280px;
            padding: 60px;
            max-width: 1200px;
        }

        .container {
            background: var(--bg-dark);
            border: var(--border-width) solid var(--border-color);
            padding: 40px;
            box-shadow: var(--shadow-solid-alt);
            margin-bottom: 40px;
            position: relative;
        }
        /* 讓容器產生錯位感 */
        .container:nth-child(even) {
            transform: translateX(20px);
        }

        /* ========================================
           標題
           ======================================== */
        .section-title {
            font-size: 28px; font-weight: 900;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: -1px;
            display: flex; align-items: center; gap: 12px;
        }
        .section-title::before {
            content: '';
            display: block;
            width: 20px; height: 20px;
            background: var(--accent-orange);
            border: 2px solid var(--text-light);
        }

        /* ========================================
           控制面板 & 輸入元素 (硬朗工業風)
           ======================================== */
        .control-panel {
            background: var(--bg-surface);
            padding: 30px;
            border: var(--border-width) solid var(--border-color);
            margin-bottom: 30px;
        }

        .row-group { margin-bottom: 24px; }

        .row-group label {
            display: block;
            font-size: 14px; font-weight: 700;
            color: var(--accent-yellow);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        textarea, input[type="text"], input[type="number"], select {
            font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
            width: 100%;
            padding: 14px;
            border: var(--border-width) solid var(--text-dim);
            background: var(--bg-dark);
            color: var(--text-light);
            font-size: 16px;
            border-radius: 0;
            outline: none;
            transition: all var(--transition-raw);
        }
        textarea { height: 160px; resize: vertical; }
        
        textarea:focus, input:focus, select:focus {
            border-color: var(--accent-orange);
            box-shadow: 4px 4px 0px var(--accent-orange);
            transform: translate(-2px, -2px);
        }

        /* ========================================
           實體按鍵 (Brutalist Buttons)
           ======================================== */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 16px 24px;
            border: var(--border-width) solid var(--border-color);
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
            font-size: 16px; font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--shadow-solid);
            transition: all var(--transition-raw);
            border-radius: 0;
        }
        
        .btn:hover {
            transform: translate(2px, 2px);
            box-shadow: var(--shadow-solid-hover);
        }
        .btn:active {
            transform: translate(6px, 6px);
            box-shadow: none;
        }

        .btn-full { width: 100%; }
        
        .btn-primary { background: var(--text-light); color: var(--text-dark); border-color: var(--text-light); box-shadow: 6px 6px 0px var(--accent-orange); }
        .btn-outline { background: transparent; }
        .btn-accent { background: var(--accent-yellow); color: var(--text-dark); border-color: var(--text-light); box-shadow: 4px 4px 0px var(--text-light); }

        .export-panel {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-top: 24px;
        }

        /* ========================================
           資料表格 (高對比/斑馬紋)
           ======================================== */
        table {
            width: 100%; border-collapse: collapse;
            font-size: 15px; margin-top: 20px;
            border: var(--border-width) solid var(--border-color);
        }
        th, td { 
            padding: 16px; 
            text-align: left; 
            border: 1px solid var(--text-dim);
        }
        th {
            background: var(--text-light);
            color: var(--text-dark);
            font-weight: 900;
            text-transform: uppercase;
        }
        tbody tr:nth-child(even) { background: var(--bg-surface); }
        tbody tr:hover { background: rgba(255, 94, 0, 0.1); }

        /* ========================================
           儀表板 (解構佈局)
           ======================================== */
        .dashboard {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }
        .dashboard.visible { display: grid; }

        .dash-card {
            background: var(--bg-offset);
            border: var(--border-width) solid var(--text-dim);
            padding: 24px;
            position: relative;
        }
        /* 裝飾性釘子 */
        .dash-card::before, .dash-card::after {
            content: '+'; position: absolute; color: var(--text-dim); font-size: 20px; line-height: 1;
        }
        .dash-card::before { top: 10px; left: 10px; }
        .dash-card::after { bottom: 10px; right: 10px; }

        .dash-item {
            font-size: 15px; font-weight: 400;
            margin-bottom: 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px dashed var(--text-dim);
            padding-bottom: 8px;
        }
        .dash-highlight {
            color: var(--accent-orange);
            font-size: 20px; font-weight: 900;
        }

        .vet-input {
            width: 80px !important;
            padding: 8px !important;
            text-align: right;
            border-color: var(--accent-yellow);
        }

        /* ========================================
           狀態標籤 & Radio
           ======================================== */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            font-size: 12px; font-weight: 900;
            text-transform: uppercase;
            border: 1px solid currentColor;
        }
        .tag-new { color: var(--accent-orange); background: rgba(255,94,0,0.1); }
        .tag-hosp { color: var(--text-dim); background: rgba(148,146,139,0.1); }

        input[type="radio"] {
            appearance: none;
            width: 20px; height: 20px;
            border: 2px solid var(--text-dim);
            border-radius: 0;
            background: var(--bg-dark);
            cursor: pointer;
            position: relative;
        }
        input[type="radio"]:checked {
            border-color: var(--accent-orange);
        }
        input[type="radio"]:checked::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px; right: 3px; bottom: 3px;
            background: var(--accent-orange);
        }

        /* ========================================
           速查區篩選列
           ======================================== */
        .filter-bar {
            display: flex; gap: 20px; margin-bottom: 30px;
        }
        .filter-bar select { width: 200px; }
        .filter-bar input[type="text"] { flex: 1; }

        .status-msg {
            font-weight: 700; font-size: 15px;
            margin-top: 20px; padding: 16px;
            border: var(--border-width) solid transparent;
        }
        .status-msg.success {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
        .status-msg.error {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }

        /* ========================================
           響應式 (適應小螢幕)
           ======================================== */
        @media (max-width: 1024px) {
            .sidebar { width: 220px; }
            .main-content { margin-left: 220px; padding: 40px; }
            .container { transform: none !important; }
        }
        @media (max-width: 768px) {
            .sidebar { position: relative; width: 100%; height: auto; border-right: none; border-bottom: var(--border-width) solid var(--border-color); padding: 20px 0; }
            .main-content { margin-left: 0; padding: 20px; }
            .dashboard, .filter-bar { grid-template-columns: 1fr; flex-direction: column; }
            .container { padding: 20px; }
        }

    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">SYS.WORKFLOWS_</div>
    
    <a href="#" id="link-hospice" class="menu-link active" onclick="showSection('hospice')">
        <svg class="icon-raw" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12h6M12 9v6"/></svg>
        安寧核對
    </a>
    <a href="#" id="link-birthday" class="menu-link" onclick="showSection('birthday')">
        <svg class="icon-raw" viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="12"/><path d="M12 8v-4M9 4h6"/></svg>
        慶生名單
    </a>
    <a href="#" id="link-directory" class="menu-link" onclick="showSection('directory')">
        <svg class="icon-raw" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16"/><path d="M6 10h12M6 14h8"/></svg>
        總名冊速查
    </a>
</div>

<div id="main" class="main-content">

    <div id="sec-hospice" class="container">
        <h2 class="section-title">榮民安寧報表核對</h2>
        <div class="control-panel">
            <div class="row-group">
                <label>[ DATA_INPUT ] 貼上當月純榮民名單或系統備份檔</label>
                <textarea id="vetData" placeholder="Paste data here..."></textarea>
            </div>
            <button class="btn btn-primary btn-full" onclick="processVetData()">
                <svg class="icon-raw" viewBox="0 0 24 24" style="width:18px;height:18px;"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                EXECUTE_MATCH
            </button>
        </div>

        <div id="vetDashboard" class="dashboard">
            <div class="dash-card">
                <div class="dash-item"><span>[A] 月底總床數</span> <span id="stat-A" class="dash-highlight">0</span></div>
                <div class="dash-item"><span>[C] 佔床人數 (扣住院)</span> <span id="stat-C" class="dash-highlight">0</span></div>
                <div class="dash-item"><span>[D] 預立安寧註記</span> <span id="stat-D" class="dash-highlight">0</span></div>
                <div class="dash-item"><span>[E] 簽署 DNR</span> <span id="stat-E" class="dash-highlight">0</span></div>
                <div class="dash-item"><span>[I] 新入住 (<30天)</span> <span id="stat-I" class="dash-highlight">0</span></div>
            </div>
            <div class="dash-card">
                <div class="dash-item" style="color: var(--accent-yellow);"><span>[J] 入住單身榮民數</span> <input type="number" id="input-J" class="vet-input" value="0" oninput="calculateVetStats()"></div>
                <div class="dash-item" style="color: var(--accent-yellow);"><span>[K] 單身榮民預立安寧</span> <input type="number" id="input-K" class="vet-input" value="0" oninput="calculateVetStats()"></div>
                <div class="dash-item"><span>[L] 單身安寧比例 (K/J)</span> <span id="stat-L" class="dash-highlight">0%</span></div>
                <div class="dash-item"><span>[M] 辨識評估人數 (同C)</span> <span id="stat-M" class="dash-highlight">0</span></div>
                
                <div style="display:flex; gap:16px; margin-top:24px;">
                    <button class="btn btn-outline" style="flex:1; font-size: 13px;" onclick="exportVetWord()">EXPORT_DOC</button>
                    <button class="btn btn-accent" style="flex:1; font-size: 13px;" onclick="exportVetExcel()">BACKUP_XLS</button>
                </div>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table id="vetTable" style="display: none;">
                <thead>
                    <tr>
                        <th>STATUS</th><th>BED</th><th>NAME</th><th>DAYS</th>
                        <th style="color: var(--accent-orange);">DNR</th>
                        <th style="color: var(--accent-green);">安寧</th>
                        <th style="color: var(--text-dim);">無</th>
                    </tr>
                </thead>
                <tbody id="vetBody"></tbody>
            </table>
        </div>
    </div>

    <div id="sec-birthday" class="container" style="display: none;">
        <h2 class="section-title">每月慶生報表引擎</h2>
        <div class="control-panel">
            <div class="row-group">
                <label>[ PARAM_01 ] 設定月份</label>
                <input type="number" id="monthInput" value="4" style="width: 150px;">
            </div>
            <div class="row-group">
                <label>[ PARAM_02 ] 貼上 Excel 總名冊</label>
                <textarea id="excelData" placeholder="Raw excel data..."></textarea>
            </div>
            <button class="btn btn-primary btn-full" onclick="processData()">
                <svg class="icon-raw" viewBox="0 0 24 24" style="width:18px;height:18px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                COMPILE_DATA
            </button>
            <div id="statusMsg" class="status-msg"></div>
        </div>
        <div id="exportArea" class="export-panel">
            <button class="btn btn-outline" onclick="exportDoc1()">[1] 送禮對照</button>
            <button class="btn btn-outline" onclick="exportCsv2()">[2] 系統名單 CSV</button>
            <button class="btn btn-accent" onclick="exportDoc3()">[3] 單位物資分配</button>
        </div>
    </div>

    <div id="sec-directory" class="container" style="display: none;">
        <h2 class="section-title">住民資料快搜</h2>
        <div class="filter-bar">
            <select id="unitFilter" onchange="renderDirectory()">
                <option value="">[ ALL_UNITS ]</option>
                <option value="H1">H1 樂齡</option>
                <option value="H2">H2 溫馨</option>
                <option value="H3">H3 自強</option>
                <option value="H4">H4 幸福</option>
                <option value="H5">H5 長壽</option>
                <option value="H6">H6 樂活</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search name..." onkeyup="renderDirectory()">
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>UNIT</th><th>BED</th><th>NAME</th><th>AGE</th><th>GENDER</th></tr>
                </thead>
                <tbody id="directoryBody">
                    <tr><td colspan="5" style="color: var(--text-dim); padding: 30px; text-align: center; border:none;">No data. Please compile directory first.</td></tr>
                </tbody>
            </table>
        </div>
        <div id="dirCount" style="margin-top: 20px; text-align: right; color: var(--accent-yellow); font-weight: 700;"></div>
    </div>

</div>

<script>
    // ==========================================
    // UI 介面控制
    // ==========================================

    function showSection(sectionId) {
        const sections = ['hospice', 'birthday', 'directory'];
        sections.forEach(id => {
            document.getElementById('sec-' + id).style.display = (id === sectionId) ? 'block' : 'none';
        });

        document.querySelectorAll('.sidebar a.menu-link').forEach(link => link.classList.remove('active'));
        document.getElementById('link-' + sectionId).classList.add('active');
    }

    // ==========================================
    // 核心資料與共用變數
    // ==========================================
    let globalData = [];
    let allResidents = [];
    let currentVets = [];
    let reportTitleStr = '';

    const currentYear = new Date().getFullYear();
    const rocCurrentYear = currentYear - 1911;
    const unitNames = {
        'H1': '樂齡小屋', 'H2': '溫馨小屋', 'H3': '自強村',
        'H4': '幸福村', 'H5': '長壽村', 'H6': '樂活村'
    };

    window.addEventListener('load', function() {
        const savedData = localStorage.getItem('nursingHomeDirectory');
        if (savedData) {
            allResidents = JSON.parse(savedData);
            renderDirectory();
        }
    });

    function downloadWord(htmlBody, fileName) {
        const fullHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>@page { size: A4 portrait; margin: 2.0cm; mso-page-orientation: portrait; } body { font-family: '標楷體', 'DFKai-SB', serif; font-size: 14pt; } p { margin: 0; padding: 0; line-height: 1.5; }</style></head><body>${htmlBody}</body></html>`;
        const blob = new Blob(['\ufeff', fullHtml], { type: 'application/msword' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${fileName}.doc`;
        link.click();
    }

    // ==========================================
    // 模塊一：榮民安寧報表自動核對
    // ==========================================

    function getSavedVetStatus() {
        const saved = localStorage.getItem('vetStatusMemory');
        return saved ? JSON.parse(saved) : {};
    }

    function updateVetStatus(name, status) {
        const memory = getSavedVetStatus();
        memory[name] = status;
        localStorage.setItem('vetStatusMemory', JSON.stringify(memory));
        const vet = currentVets.find(v => v.name === name);
        if (vet) vet.status = status;
        calculateVetStats();
    }

    function processVetData() {
        const text = document.getElementById('vetData').value;
        if (!text.trim()) { alert('ERROR: NO DATA FOUND.'); return; }

        let memory = getSavedVetStatus();
        currentVets = [];
        const lines = text.split('\n');

        reportTitleStr = lines[0].trim();
        if (reportTitleStr.includes('序號') || reportTitleStr.includes('姓名') || reportTitleStr.length > 20) {
            reportTitleStr = `${new Date().getFullYear()}${String(new Date().getMonth() + 1).padStart(2, '0')} 身分別報表`;
        }

        const isBackupFile = lines.some(l => l.includes('DNR') && l.includes('安寧') && l.includes('無') && l.includes('狀態'));

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line || line.includes('序號') || line.includes('狀態,樓館')) continue;
            const cols = line.split('\t');

            let bldg = '', bed = '', name = '', days = 999;

            if (isBackupFile && cols.length >= 7) {
                bldg = cols[1].trim(); bed = cols[2].trim(); name = cols[3].trim();
                days = parseInt(cols[4].trim(), 10);
                let restoredStatus = '';
                if (cols[5].trim() === 'O') restoredStatus = 'DNR';
                else if (cols[6].trim() === 'O') restoredStatus = '安寧';
                else if (cols[7] && cols[7].trim() === 'O') restoredStatus = '無';
                if (restoredStatus) memory[name] = restoredStatus;
            } else if (cols.length >= 4) {
                bldg = (cols[1] || '').trim();
                bed = (cols[2] || '').trim();
                name = (cols[3] || '').trim();
                days = cols[6] ? parseInt(cols[6].trim(), 10) : 999;
            } else {
                continue;
            }

            if (!name) continue;

            const isHospitalized = !/[a-zA-Z]/.test(bldg) && bldg !== '';
            const isNew = !isNaN(days) && days < 30;
            const status = memory[name] || '';

            currentVets.push({ bldg, bed, name, days: isNaN(days) ? '-' : days, isHospitalized, isNew, status });
        }

        if (isBackupFile) localStorage.setItem('vetStatusMemory', JSON.stringify(memory));

        renderVetTable();
        calculateVetStats();

        document.getElementById('vetDashboard').classList.add('visible');
        document.getElementById('vetTable').style.display = 'table';

        if (isBackupFile) alert('SYSTEM MSG: Backup detected. DNR and Hospice data restored.');
    }

    function renderVetTable() {
        const tbody = document.getElementById('vetBody');
        tbody.innerHTML = '';
        currentVets.forEach(vet => {
            const tr = document.createElement('tr');
            let tags = '';
            if (vet.isHospitalized) tags += '<span class="tag tag-hosp">住院</span> ';
            if (vet.isNew) tags += '<span class="tag tag-new">NEW</span>';
            
            if (vet.isHospitalized) tr.style.opacity = '0.5';

            const safeName = vet.name.replace(/'/g, "\\'");
            tr.innerHTML = `
                <td>${tags}</td>
                <td style="font-weight: 700; color: var(--accent-yellow);">${vet.bldg}-${vet.bed}</td>
                <td style="font-size: 16px; font-weight: 700;">${vet.name}</td>
                <td>${vet.days}</td>
                <td><input type="radio" name="status_${safeName}" value="DNR" ${vet.status === 'DNR' ? 'checked' : ''} onchange="updateVetStatus('${safeName}', 'DNR')"></td>
                <td><input type="radio" name="status_${safeName}" value="安寧" ${vet.status === '安寧' ? 'checked' : ''} onchange="updateVetStatus('${safeName}', '安寧')"></td>
                <td><input type="radio" name="status_${safeName}" value="無" ${vet.status === '無' ? 'checked' : ''} onchange="updateVetStatus('${safeName}', '無')"></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function calculateVetStats() {
        const statA = currentVets.length;
        const validVets = currentVets.filter(v => !v.isHospitalized);
        const statC = validVets.length;
        const statD = validVets.filter(v => v.status === '安寧').length;
        const statE = validVets.filter(v => v.status === 'DNR').length;
        const statI = currentVets.filter(v => v.isNew).length;

        const inputJ = parseInt(document.getElementById('input-J').value) || 0;
        const inputK = parseInt(document.getElementById('input-K').value) || 0;
        const statL = inputJ > 0 ? ((inputK / inputJ) * 100).toFixed(1) + '%' : '0.0%';

        document.getElementById('stat-A').textContent = statA;
        document.getElementById('stat-C').textContent = statC;
        document.getElementById('stat-D').textContent = statD;
        document.getElementById('stat-E').textContent = statE;
        document.getElementById('stat-I').textContent = statI;
        document.getElementById('stat-L').textContent = statL;
        document.getElementById('stat-M').textContent = statC;
    }

    function exportVetExcel() {
        let csvContent = '狀態\t樓館\t床位\t姓名\t入住天數\tDNR\t安寧\t無\n';
        currentVets.forEach(v => {
            const statusTag = v.isHospitalized ? '住院' : (v.isNew ? '新入住' : '');
            const dnrMark = v.status === 'DNR' ? 'O' : '';
            const hospiceMark = v.status === '安寧' ? 'O' : '';
            const noneMark = v.status === '無' ? 'O' : '';
            csvContent += `${statusTag}\t${v.bldg}\t${v.bed}\t${v.name}\t${v.days}\t${dnrMark}\t${hospiceMark}\t${noneMark}\n`;
        });
        const blob = new Blob(['\ufeff' + csvContent], { type: 'application/vnd.ms-excel;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${reportTitleStr}_系統備份檔.xls`;
        link.click();
    }

    function exportVetWord() {
        let html = `<p style="text-align:center; font-size: 18pt; font-weight:bold; margin-bottom:15px;">${reportTitleStr}</p>`;
        html += `<table border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; width: 100%; text-align: center; font-family: '標楷體', serif; font-size: 12pt;">
                 <tr><th>序號</th><th>樓館</th><th>床位</th><th>姓名</th><th>入住天數</th><th>DNR</th><th>安寧</th><th>無</th><th>備註</th></tr>`;

        currentVets.forEach((v, index) => {
            const dnrMark = v.status === 'DNR' ? '✓' : '';
            const hospiceMark = v.status === '安寧' ? '✓' : '';
            const noneMark = v.status === '無' ? '✓' : '';
            const remarks = v.isHospitalized ? '住院' : (v.isNew ? 'New' : '');

            html += `<tr>
                <td>${index + 1}</td><td>${v.bldg}</td><td>${v.bed}</td>
                <td style="font-weight: bold;">${v.name}</td><td>${v.days}</td>
                <td style="font-size: 14pt; font-weight: bold;">${dnrMark}</td>
                <td style="font-size: 14pt; font-weight: bold;">${hospiceMark}</td>
                <td style="font-size: 14pt; font-weight: bold;">${noneMark}</td>
                <td style="color: red;">${remarks}</td>
            </tr>`;
        });
        html += '</table>';
        downloadWord(html, `${reportTitleStr}_紙本列印`);
    }

    // ==========================================
    // 模塊二：慶生報表處理邏輯
    // ==========================================

    function processData() {
        const text = document.getElementById('excelData').value;
        const targetMonth = parseInt(document.getElementById('monthInput').value, 10);
        globalData = [];
        allResidents = [];

        if (!text.trim()) { alert('ERROR: DATA REQUIRED.'); return; }

        const lines = text.split('\n');
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const cols = line.split('\t');
            if (cols.length < 4) continue;

            const room = (cols[0] || '').trim();
            const name = (cols[1] || '').trim();
            const rawGender = (cols[2] || '').trim();
            const birthdayStr = (cols[3] || '').trim();

            if (name === '住民姓名' || birthdayStr === '出生日期') continue;

            const gender = rawGender.toUpperCase() === 'F' ? '女' : '男';
            
            if (birthdayStr.length >= 8) {
                const cleanBirthday = birthdayStr.replace(/[^0-9]/g, '');
                if (cleanBirthday.length >= 8) {
                    const bMonth = parseInt(cleanBirthday.substring(4, 6), 10);
                    const bYear = parseInt(cleanBirthday.substring(0, 4), 10);
                    const age = currentYear - bYear;
                    const rocDate = `${bYear - 1911}.${cleanBirthday.substring(4, 6)}.${cleanBirthday.substring(6, 8)}`;
                    const unitCode = room.split('-')[0];

                    allResidents.push({ room, name, age, gender, unitCode });
                    if (bMonth === targetMonth) {
                        globalData.push({ room, name, rawGender, gender, cleanBirthday, rocDate, age, unitCode });
                    }
                }
            }
        }

        if (allResidents.length > 0) {
            localStorage.setItem('nursingHomeDirectory', JSON.stringify(allResidents));
            renderDirectory();
        }

        const msgEl = document.getElementById('statusMsg');
        if (globalData.length > 0) {
            msgEl.textContent = `STATUS: SUCCESS. Extracted ${globalData.length} records.`;
            msgEl.className = 'status-msg success';
            document.getElementById('exportArea').style.display = 'grid';
        } else {
            msgEl.textContent = allResidents.length > 0
                ? `STATUS: No birthday matches for month ${targetMonth}.`
                : 'STATUS: ERROR. Invalid format.';
            msgEl.className = 'status-msg error';
        }
    }

    // ==========================================
    // 模塊三：住民速查處理邏輯
    // ==========================================

    function renderDirectory() {
        const tbody = document.getElementById('directoryBody');
        const unitFilter = document.getElementById('unitFilter').value;
        const searchInput = document.getElementById('searchInput').value.trim();
        tbody.innerHTML = '';
        let count = 0;

        allResidents.forEach(person => {
            if (unitFilter && !person.unitCode.startsWith(unitFilter)) return;
            if (searchInput && !person.name.includes(searchInput)) return;
            count++;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color: var(--text-dim);">${person.unitCode}</td>
                <td style="font-weight: 700; color: var(--accent-yellow);">${person.room}</td>
                <td style="font-weight: 700; font-size: 16px;">${person.name}</td>
                <td style="color: var(--accent-orange); font-weight: 700;">${person.age}</td>
                <td>${person.gender}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('dirCount').textContent = `TOTAL MATCHES: ${count}`;
    }

    // ==========================================
    // 慶生報表匯出功能
    // ==========================================

    function exportDoc1() {
        const month = document.getElementById('monthInput').value.padStart(2, '0');
        let html = `<p style="text-align:center; font-size: 16pt; font-weight:bold; margin-bottom:10px;">臺中榮總嘉義分院附設護理之家${rocCurrentYear}年${month}月壽星</p>`;
        html += `<table border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; width: 100%; text-align: center; font-family: '標楷體', serif; font-size: 12pt;"><tr><th>編號</th><th>床位</th><th>姓名</th><th>出生年月日</th><th>年齡</th><th>性別</th><th>備註</th></tr>`;
        globalData.forEach((d, i) => html += `<tr><td>${i + 1}</td><td>${d.room}</td><td>${d.name}</td><td>${d.rocDate}</td><td>${d.age}</td><td>${d.gender}</td><td></td></tr>`);
        html += '</table>';
        downloadWord(html, `${rocCurrentYear}.${month}月-列印當天送禮名單對照`);
    }

    function exportCsv2() {
        const month = document.getElementById('monthInput').value.padStart(2, '0');
        let csvContent = '床位,住民姓名,性別,出生日期,民國生日,年齡\n';
        globalData.forEach(d => csvContent += `${d.room},${d.name},${d.rawGender},${d.cleanBirthday},${d.rocDate},${d.age}\n`);
        const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${rocCurrentYear}.${month}月壽星名單.csv`;
        link.click();
    }

    function exportDoc3() {
        const month = document.getElementById('monthInput').value.padStart(2, '0');
        let html = '';
        const grouped = {};
        const hcData = globalData.filter(d => d.unitCode.startsWith('H'));
        hcData.forEach(d => {
            if (!grouped[d.unitCode]) grouped[d.unitCode] = [];
            grouped[d.unitCode].push(d);
        });

        for (const [unit, people] of Object.entries(grouped)) {
            const unitName = unitNames[unit] || '';
            html += `<p style="font-size: 14pt; font-weight: bold; margin-bottom: 5px;">${unit}${unitName}---${month}月壽星，每人兩瓶雞精</p>`;
            html += `<table border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; width: 100%; text-align: center; font-family: '標楷體', serif; font-size: 14pt; margin-bottom: 20px;">`;
            people.forEach(p => html += `<tr><td style="width: 50%;">${p.room}</td><td style="width: 50%;">${p.name}</td></tr>`);
            html += '</table>';
        }
        downloadWord(html, `${rocCurrentYear}.${month}-給各單位雞精名單-印`);
    }
</script>
